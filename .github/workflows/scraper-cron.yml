name: Scrape jobs

on:
  schedule:
    # Every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source to scrape"
        default: "all"
        type: choice
        options: [all, remoteok, linkedin, threads]

# Allow the job to push the refreshed data file back to main.
permissions:
  contents: write

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape and publish jobs.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Scrape
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          RESIDENTIAL_PROXY_URL: ${{ secrets.RESIDENTIAL_PROXY_URL }}
        run: python -m scrapers.runner --source "${{ github.event.inputs.source || 'all' }}"

      - name: Commit refreshed data
        run: |
          if [[ -z "$(git status --porcelain public/data/jobs.json)" ]]; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/jobs.json
          git commit -m "chore(data): refresh jobs.json"
          git push
