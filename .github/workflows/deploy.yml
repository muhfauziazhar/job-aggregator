name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # The scraper cron commits data with GITHUB_TOKEN, which by design does NOT
  # trigger other workflows. Redeploy when "Scrape jobs" finishes so a fresh
  # jobs.json actually reaches the site.
  workflow_run:
    workflows: ["Scrape jobs"]
    types: [completed]

# Allow GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but let in-progress runs finish so a
# scraper data commit doesn't cancel a deploy mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    # On a workflow_run trigger, only deploy if the scrape actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Always build the latest main (includes the cron's data commit),
          # regardless of which event triggered this run.
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
